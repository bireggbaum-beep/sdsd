<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>SDSD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #131313;
    --panel-hi: #1a1a1a;
    --border: #262626;
    --border-hi: #3a3a3a;
    --text: #e4e4e4;
    --text-dim: #8a8a8a;
    --text-faint: #5a5a5a;
    --accent: #d4ff00;
    --t-blue: #4a9eff;
    --t-green: #4ade80;
    --t-yellow: #fbbf24;
    --t-red: #f43f5e;
    --crash: #ff6b35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  @media (min-width: 720px) {
    body { display: flex; justify-content: center; }
    #app {
      width: 100%;
      max-width: 720px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .fab { right: calc(50% - 360px + 16px); }
    .modal-bg { align-items: center; }
    .modal { max-width: 680px; width: 100%; }
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
    background: var(--bg);
  }
  .brand {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .brand h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .brand .ver { font-size: 10px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
  #sync-dot { color: var(--text-faint); font-size: 8px; vertical-align: middle; transition: color 0.3s; }
  #sync-dot.ok   { color: var(--t-green); }
  #sync-dot.off  { color: var(--t-red); }
  #sync-dot.busy { color: var(--accent); }

  nav.tabs { display: flex; gap: 0; }
  nav.tabs button {
    background: none; border: none; color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    padding: 10px 11px; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    text-transform: uppercase;
  }
  nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  nav.tabs button:hover:not(.active) { color: var(--text-dim); }

  main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  main::-webkit-scrollbar { width: 0; }

  .budget-bar {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .budget-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .budget-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .budget-vals { font-family: 'JetBrains Mono', monospace; display: flex; gap: 14px; align-items: baseline; }
  .budget-vals .big { font-size: 28px; font-weight: 700; line-height: 1; color: var(--text); }
  .budget-vals .sep { color: var(--text-faint); font-size: 18px; }
  .budget-vals .demand { font-size: 18px; color: var(--text-dim); font-weight: 500; transition: color 0.3s; }
  .budget-vals .demand.over { color: var(--t-red); }

  .budget-meter {
    height: 4px; background: var(--border); overflow: hidden; position: relative;
  }
  .budget-meter .used {
    height: 100%; background: var(--accent); transition: width 0.5s;
  }
  .budget-meter .deficit {
    position: absolute; top: 0; height: 100%;
    background: var(--t-red); opacity: 0.4;
    transition: width 0.5s, left 0.5s;
  }
  .deficit-note {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--t-red); text-transform: uppercase;
    opacity: 0; transition: opacity 0.3s;
  }
  .deficit-note.show { opacity: 1; }

  .energy-filter {
    display: flex; gap: 6px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .energy-filter button {
    flex: 1; background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.15em;
    padding: 8px 0; cursor: pointer;
    text-transform: uppercase; transition: all 0.15s;
  }
  .energy-filter button.on {
    background: var(--panel-hi);
    border-color: var(--accent);
    color: var(--accent);
  }

  .module-list { padding: 8px 0 80px; }
  .module-card {
    display: grid;
    grid-template-columns: 4px 1fr auto;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .mod-sparkstrip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    pointer-events: none;
    overflow: hidden;
  }
  .heat-track {
    position: relative;
    display: flex;
    gap: 1px;
    width: 100%; height: 100%;
  }
  .heat-box {
    flex: 1 1 0;
    height: 100%;
    border-radius: 1px;
  }
  .heat-marker {
    position: absolute;
    top: -1px; bottom: -1px; width: 2px;
    margin-left: -1px; z-index: 1;
    background: #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.65);
  }
  .heat-axis {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-top: 3px;
  }
  .module-card:active { background: var(--panel); }
  .tier-stripe { background: var(--text-faint); transition: background 0.4s; }
  .tier-stripe.t-blue   { background: var(--t-blue); }
  .tier-stripe.t-green  { background: var(--t-green); }
  .tier-stripe.t-yellow { background: var(--t-yellow); }
  .tier-stripe.t-red    { background: var(--t-red); }

  .mod-body { padding: 14px 14px 14px 12px; min-width: 0; position: relative; overflow: hidden; }
  .mod-top {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 6px; gap: 8px;
  }
  .mod-name {
    font-size: 15px; font-weight: 500; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mod-sps {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700;
    color: var(--text); flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .mod-druck { display: flex; align-items: baseline; gap: 5px; flex-shrink: 0; }
  .mod-druck-cap {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
  }
  .mod-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; gap: 10px; flex-wrap: wrap;
    font-variant-numeric: tabular-nums;
  }
  .mod-meta .energy-low::before    { content: '◦ '; color: var(--t-blue); }
  .mod-meta .energy-med::before    { content: '◦ '; color: var(--t-yellow); }
  .mod-meta .energy-high::before   { content: '◦ '; color: var(--t-red); }

  .mod-actions {
    display: flex; flex-direction: column;
    justify-content: center; padding: 8px 12px 8px 0; gap: 4px;
  }
  .btn-session, .btn-crash {
    border: 1px solid var(--border-hi); background: var(--panel);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    padding: 8px 12px; cursor: pointer;
    text-transform: uppercase; min-width: 78px;
  }
  .btn-session { color: var(--accent); border-color: var(--accent); }
  .btn-session:active { background: var(--accent); color: var(--bg); }
  .btn-crash { color: var(--crash); border-color: var(--crash); }
  .btn-crash:active { background: var(--crash); color: var(--bg); }

  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .mod-edit-list { padding: 8px 0 100px; }
  .mod-edit { border-bottom: 1px solid var(--border); padding: 16px; }
  .mod-state-strip {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .mod-state-strip .strip-tier {
    width: 3px; height: 28px; flex-shrink: 0;
    background: var(--text-faint);
  }
  .mod-state-strip .strip-tier.t-blue   { background: var(--t-blue); }
  .mod-state-strip .strip-tier.t-green  { background: var(--t-green); }
  .mod-state-strip .strip-tier.t-yellow { background: var(--t-yellow); }
  .mod-state-strip .strip-tier.t-red    { background: var(--t-red); }
  .mod-state-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }
  .mod-state-val strong { color: var(--text); font-weight: 700; }
  .mod-state-drift {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    margin-left: auto;
  }
  .mod-state-drift.crisis { color: var(--t-red); }
  .mod-state-drift.warn   { color: var(--t-yellow); }
  .mod-edit-header {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 12px;
  }
  .mod-edit-header h3 { font-size: 14px; font-weight: 500; }
  .mod-edit-header .type-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    padding: 3px 6px; border: 1px solid var(--border-hi);
    color: var(--text-dim); text-transform: uppercase;
  }
  .param-grid {
    display: grid; grid-template-columns: 1fr auto;
    gap: 10px 12px; align-items: center;
  }
  .param-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .param-control { display: flex; align-items: center; gap: 4px; }
  .param-control button {
    width: 32px; height: 32px;
    background: var(--panel);
    border: 1px solid var(--border-hi);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700;
    cursor: pointer; user-select: none;
    transition: background 0.05s, border-color 0.05s;
  }
  .param-control button.cycle-btn {
    width: auto; height: auto;
    padding: 4px 10px;
    font-size: 11px;
    white-space: nowrap;
  }
  .param-control button:active,
  .param-control button.holding {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .param-control button[data-heatwin] {
    width: auto; height: auto;
    padding: 6px 12px;
    font-size: 11px;
  }
  .param-control button[data-heatwin].on {
    background: var(--panel-hi);
    border-color: var(--accent);
    color: var(--accent);
  }
  .param-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700;
    min-width: 56px; text-align: center;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .mod-edit-actions {
    display: flex; gap: 8px; margin-top: 14px;
    padding-top: 14px; border-top: 1px dashed var(--border);
  }
  .mod-edit-actions button {
    background: none; border: 1px solid var(--border-hi);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    padding: 8px 12px; cursor: pointer; text-transform: uppercase;
  }
  .mod-edit-actions .danger { color: var(--t-red); border-color: var(--t-red); }

  .fab {
    position: fixed; bottom: 20px; right: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: var(--bg);
    border: none; font-size: 24px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(212, 255, 0, 0.3);
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
  }
  .fab:active { transform: scale(0.95); }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none; align-items: flex-end; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg);
    border-top: 1px solid var(--border-hi);
    width: 100%; max-height: 90vh;
    overflow-y: auto; padding: 20px 16px 28px;
  }
  .modal h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.2em;
    color: var(--text-dim); margin-bottom: 18px;
    text-transform: uppercase;
  }
  .modal label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin: 14px 0 6px;
  }
  .modal input, .modal select {
    width: 100%; background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; border-radius: 0;
  }
  .modal input:focus, .modal select:focus {
    outline: none; border-color: var(--accent);
  }
  .state-pick {
    display: grid; grid-template-columns: repeat(11, 1fr);
    gap: 4px; margin-top: 6px;
  }
  .state-pick button {
    aspect-ratio: 1; background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; cursor: pointer;
  }
  .state-pick button.sel {
    background: var(--accent);
    color: var(--bg); border-color: var(--accent);
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 22px; }
  .modal-actions button {
    flex: 1; padding: 12px 0;
    border: 1px solid var(--border-hi);
    background: var(--panel); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer;
  }
  .modal-actions .primary {
    background: var(--accent); color: var(--bg);
    border-color: var(--accent);
  }

  .log-list { padding: 8px 0 60px; }
  .log-row {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .log-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.08em;
  }
  .log-mod { font-size: 14px; }
  .log-delta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
  }
  .log-delta.down { color: var(--accent); }
  .log-delta.up { color: var(--crash); }

  .settings { padding: 18px 16px 80px; }
  .settings .param-grid { gap: 14px 12px; }

  .detail-header {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 18px;
  }
  .detail-mod-name { font-size: 18px; font-weight: 500; }
  .detail-sps {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700;
  }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em; color: var(--text-faint);
    text-transform: uppercase; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .detail-stat-grid {
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px 12px; align-items: baseline;
  }
  .detail-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em;
  }
  .detail-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700; color: var(--text);
    text-align: right; font-variant-numeric: tabular-nums;
  }
  .detail-stat-val.accent { color: var(--accent); }
  .detail-stat-val.warn { color: var(--t-yellow); }
  .detail-stat-val.danger { color: var(--t-red); }
  .sparkline-wrap {
    margin: 0 0 14px; border: 1px solid var(--border);
    background: var(--panel); padding: 8px; overflow: hidden;
  }
  .mod-body { cursor: pointer; }

  /* ─── MODUL-DETAIL (Inline Expand im Router, F1) ─── */
  .module-detail {
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
  }
  .md-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 20px;
    padding: 10px 16px 14px;
  }
  .md-full {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 2px;
  }
  .md-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--text-faint); text-transform: uppercase;
    margin-bottom: 6px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .md-stat-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 8px;
    align-items: baseline;
  }
  .md-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .md-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; color: var(--text);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .md-val.accent { color: var(--accent); }
  .md-val.warn   { color: var(--t-yellow); }
  .md-val.danger { color: var(--t-red); }
  .md-spark {
    margin-top: 8px;
  }
  .md-spark .heat-track {
    height: 22px;
  }
  .md-params {
    font-size: 10px; color: var(--text-dim);
    line-height: 1.6;
  }

  .status-box {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 12px; transition: color 0.4s;
  }
  .status-label.crisis { color: var(--t-red); }
  .status-label.ambition { color: var(--accent); }

  .status-budget-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 14px;
  }
  .status-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px; font-weight: 700; line-height: 1;
    color: var(--text); font-variant-numeric: tabular-nums;
  }
  .status-big-suffix {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.15em; text-transform: uppercase;
  }

  .status-demands {
    display: flex; gap: 20px; margin-bottom: 12px;
  }
  .status-demand {
    display: flex; align-items: baseline; gap: 6px;
  }
  .status-demand-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .status-demand-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--text); font-variant-numeric: tabular-nums;
  }
  .status-demand-val.over { color: var(--t-red); }

  .status-bar-wrap {
    position: relative; height: 10px; margin-top: 4px;
  }
  .status-bar {
    position: relative; height: 4px; top: 3px;
    background: var(--border); overflow: visible;
  }
  .status-bar-used {
    position: absolute; left: 0; top: 0; height: 100%;
    background: var(--accent); transition: width 0.4s;
  }
  .status-bar-tick {
    position: absolute; top: -3px; height: 10px; width: 2px;
    background: var(--text); transition: left 0.4s;
  }
  .status-bar-tick.catch { background: var(--text-dim); }
  .status-bar-tick.over { background: var(--t-red); }
  .status-bar-used.overdraft { background: var(--t-red); }
  .status-num.overdraft { color: var(--t-red); }
  .status-bar-tick-label {
    position: absolute; top: 12px; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;

  /* ─── EU4-STYLE TOOLTIPS ─── */

</style>

<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>SDSD ▪ STATE DISPATCHER</h1>
      <span class="ver mono"><span id="sync-dot" title="">●</span> <span id="clock">—</span></span>
    </div>
    <nav class="tabs">
      <button data-view="doing" class="active">Jetzt</button>
      <button data-view="router">Router</button>
      <button data-view="modules">Module</button>
      <button data-view="log">Log</button>
      <button data-view="analysis">Analyse</button>
      <button data-view="settings">⚙</button>
    </nav>
  </header>
  <main id="main"></main>
</div>

<button class="fab" id="fab" style="display:none">+</button>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<div class="pomo-overlay" id="pomo-overlay">
  <div class="pomo-mod" id="pomo-mod">—</div>
  <div class="pomo-time" id="pomo-time">25:00</div>
  <div class="pomo-state" id="pomo-state">Fokus</div>
  <div class="pomo-controls">
    <button id="pomo-pause">Pause</button>
    <button id="pomo-done" class="primary">✓ Fertig</button>
  </div>
  <button class="pomo-cancel" id="pomo-cancel">Abbrechen</button>
</div>

<div id="crunch-tooltip"></div>
<script>
'use strict';

// ─── SICHTBARER FEHLER-FÄNGER (Diagnose, v.a. für entfernte Geräte) ──────────
// Zeigt jeden unbehandelten JS-Fehler als roten Balken unten an, statt still in
// der Konsole zu verschwinden. So sieht man auf Handy/Tablet sofort, was bricht.
(function () {
  function show(msg) {
    var d = document.createElement('div');
    d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#f43f5e;color:#fff;font:11px/1.4 monospace;padding:8px;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = 'JS-FEHLER: ' + msg;
    (document.body || document.documentElement).appendChild(d);
  }
  window.addEventListener('error', function (e) {
    show((e.message || e.error || 'unbekannt') + '\n@ ' + (e.filename || '') + ':' + (e.lineno || '') + ':' + (e.colno || ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    show('Promise: ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
  });
})();

// ─── STORAGE ───────────────────────────────────────────────────────────────
let clockOffset = 0;   // Serverzeit − lokale Uhr; gegen Geräte-Uhren-Differenz (via syncClock)
const STORAGE_KEY = 'sdsd_v1';
const DEFAULTS = {
  modules: [],
  sessions: [],
  config: {
    sessions_per_day: 1.5,
    min_sps_threshold: 8,
    energy_filter: ['low','med','high'],
    heat_window_days: 14,
  }
};
let S = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return clone(DEFAULTS);
    const parsed = JSON.parse(raw);
    const merged = { ...clone(DEFAULTS), ...parsed, config: { ...DEFAULTS.config, ...(parsed.config || {}) } };
    // Migration: budget_per_interval (Wochenbudget) → sessions_per_day (rollierende Rate)
    if (parsed.config && parsed.config.budget_per_interval != null && parsed.config.sessions_per_day == null) {
      merged.config.sessions_per_day = +(parsed.config.budget_per_interval / 7).toFixed(2);
    }
    delete merged.config.budget_per_interval;
    delete merged.config.interval_start;
    return clampFutureSessions(merged);
  } catch(e) { console.error('load failed', e); return clone(DEFAULTS); }
}
// Robustheit gegen Uhren-Differenz zwischen Geräten: ein last_session_date, das (aus
// Sicht der lokalen Uhr) in der Zukunft liegt, würde sonst den Decay auf 0 einfrieren.
// Auf "jetzt" begrenzen → Modul läuft normal weiter, statt eingefroren zu bleiben.
function clampFutureSessions(s) {
  const now = nowMs();
  (s.modules || []).forEach(m => {
    if (m.last_session_date && m.last_session_date > now) m.last_session_date = now;
  });
  // Auch den Sync-Konflikt-Schlüssel kappen: ein zukunfts-datiertes updated_at würde
  // sonst dauerhaft als "neuester Stand" gelten und jedes frische Abhaken überschreiben.
  if (s.updated_at && s.updated_at > now) s.updated_at = now;
  return s;
}
function save() {
  S.updated_at = nowMs();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  cloudDirty = true;        // dieses Gerät hat ungesicherte Änderungen
  cloudPushDebounced();
}
let saveTimer = null;
function saveDebounced() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 250);
}
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── CLOUD-SYNC (Supabase, durable Quelle der Wahrheit) ──────────────────────
// localStorage ist nur noch Offline-Cache; Supabase hält den Stand über Monate,
// geräteübergreifend. Ganzer State als ein JSON-Blob (eine Zeile) → Last-Write-Wins
// per updated_at, kein Auth (privates Test-Tool, geteilte Zeile).
const SUPABASE_URL = 'https://hqmzkxkhzbyfamnzazen.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NCO7RCt3NN-eP-KkypHX5g_EL8naa0p';
// Dev/Prod-Trennung: localhost (Entwicklung/Test) schreibt in eine eigene Zeile,
// damit Testdaten nie die echten Daten überschreiben.
const IS_DEV = ['localhost', '127.0.0.1'].includes(location.hostname);
const CLOUD_ROW_ID = IS_DEV ? 'sdsd_dev' : 'main';
const CLOUD_ENDPOINT = `${SUPABASE_URL}/rest/v1/sdsd_state`;
const CLOUD_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
};
function setSyncStatus(state) {
  const el = document.getElementById('sync-dot');
  if (!el) return;
  el.className = state; // '', 'ok', 'off', 'busy'
  el.title = state === 'ok' ? 'Synchronisiert' : state === 'off' ? 'Offline — nur lokal' : state === 'busy' ? 'Synchronisiere…' : '';
}
let cloudTimer = null;
let cloudDirty = false;
let cloudBaseTs = 0;   // updated_at (ms) des Cloud-Stands, den dieses Gerät zuletzt kennt — Basis für Konflikt-Erkennung

async function cloudPull() {
  setSyncStatus('busy');
  try {
    const res = await fetch(`${CLOUD_ENDPOINT}?id=eq.${CLOUD_ROW_ID}&select=data`, { headers: CLOUD_HEADERS });
    syncClock(res);
    if (!res.ok) throw new Error('pull ' + res.status);
    const rows = await res.json();
    if (rows.length === 0) { await cloudWrite(); return; } // Cloud leer → lokalen Stand initialisieren
    const remote = rows[0].data || {};
    const localTs = S.updated_at || 0;
    const remoteTs = remote.updated_at || 0;
    cloudBaseTs = remoteTs;   // wir kennen jetzt den aktuellen Cloud-Stand
    if (remoteTs > localTs && !cloudDirty) {
      // Remote ist neuer UND dieses Gerät hat keine ungesicherten Änderungen → übernehmen.
      S = clampFutureSessions({ ...clone(DEFAULTS), ...remote, config: { ...DEFAULTS.config, ...(remote.config || {}) } });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
      cloudDirty = false;
      render();
    } else if (localTs > remoteTs || cloudDirty) {
      await cloudWrite(); // lokal neuer/ungesichert → hochladen (Reconcile beim Laden, kein Prompt)
    }
    setSyncStatus('ok');
  } catch (e) {
    console.warn('cloudPull fehlgeschlagen (offline?)', e);
    setSyncStatus('off');
  }
}

function cloudPushDebounced() {
  if (cloudTimer) clearTimeout(cloudTimer);
  cloudTimer = setTimeout(cloudPush, 600);
}

// Push mit Frische-Check (optimistic concurrency): erst prüfen, ob ein anderes Gerät seit
// unserem bekannten Stand (cloudBaseTs) geschrieben hat. Wenn ja → NICHT still überschreiben, fragen.
async function cloudPush() {
  setSyncStatus('busy');
  try {
    const chk = await fetch(`${CLOUD_ENDPOINT}?id=eq.${CLOUD_ROW_ID}&select=data`, { headers: CLOUD_HEADERS });
    if (chk.ok) {
      const rows = await chk.json();
      if (rows.length > 0) {
        const remoteTs = (rows[0].data && rows[0].data.updated_at) || 0;
        if (remoteTs > cloudBaseTs) {   // Cloud wurde anderswo geändert → Konflikt
          setSyncStatus('off');
          showConflictModal();
          return;
        }
      }
    }
    await cloudWrite();
    setSyncStatus('ok');
  } catch (e) {
    console.warn('cloudPush fehlgeschlagen (offline?)', e);
    setSyncStatus('off');
  }
}

// Roher Schreibvorgang ohne Check (intern: Reconcile, Init, Konflikt-Auflösung).
async function cloudWrite() {
  const ts = S.updated_at || nowMs();
  const res = await fetch(CLOUD_ENDPOINT, {
    method: 'POST',
    headers: { ...CLOUD_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ id: CLOUD_ROW_ID, data: S, updated_at: new Date(ts).toISOString() }),
  });
  if (!res.ok) throw new Error('write ' + res.status);
  cloudDirty = false;
  cloudBaseTs = ts;   // unser Stand ist jetzt der bekannte Cloud-Stand
}

// Flush beim Verlassen/Hintergrund: keepalive-Push überlebt das Schließen der Seite.
// Nur wenn dieses Gerät ungesicherte Änderungen hat. (Während Unload kein interaktiver Konflikt-Prompt möglich.)
function cloudFlush() {
  if (!cloudDirty) return;
  try {
    fetch(CLOUD_ENDPOINT, {
      method: 'POST',
      headers: { ...CLOUD_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: CLOUD_ROW_ID, data: S, updated_at: new Date().toISOString() }),
      keepalive: true,
    });
    cloudDirty = false;
  } catch (e) { /* offline → bleibt dirty, nächster Versuch beim nächsten save/visible */ }
}

// ─── ENGINE ────────────────────────────────────────────────────────────────
const DAY_MS = 86400000;
function nowMs() { return Date.now() + clockOffset; }
// Autoritative Serverzeit aus dem Date-Header einer Supabase-Antwort übernehmen.
function syncClock(res) {
  try {
    var h = res && res.headers && res.headers.get('date');
    if (h) { var srv = Date.parse(h); if (!isNaN(srv)) clockOffset = srv - Date.now(); }
  } catch (e) {}
}
function todayStart() { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function daysSinceFrac(ts) { return Math.max(0, (nowMs() - ts) / DAY_MS); }
function calendarDaysUntil(ts) {
  const t = new Date(ts); t.setHours(0,0,0,0);
  return Math.max(0, Math.floor((t.getTime() - todayStart()) / DAY_MS));
}

const ttEl = document.getElementById('crunch-tooltip');
function ttShow(anchor, html) {
  ttEl.innerHTML = html;
  ttEl.classList.add('show');
  const r = anchor.getBoundingClientRect();
  const tw = ttEl.offsetWidth, th = ttEl.offsetHeight;
  let x = r.left + r.width / 2 - tw / 2;
  let y = r.top - th - 8;
  if (y < 4) y = r.bottom + 8;
  if (x < 4) x = 4;
  if (x + tw > window.innerWidth - 4) x = window.innerWidth - tw - 4;
  ttEl.style.left = x + 'px';
  ttEl.style.top = y + 'px';
}
function ttHide() { ttEl.classList.remove('show'); }
function ttRow(label, val, cls) {
  return `<div class="tt-row"><span class="tt-label">${label}</span><span class="tt-val ${cls || ''}">${val}</span></div>`;
}
function ttBind(container) {
  if (!container) return;
  container.querySelectorAll('[data-tt]').forEach(el => {
    el.classList.add('tt-anchor');
    el.onmouseenter = () => {
      const fn = ttBuilders[el.dataset.tt];
      if (fn) ttShow(el, fn(el));
    };
    el.onmouseleave = ttHide;
  });
}

const CRISIS_STATE = 8;
const DRIFT_BANDS = {
  1: [0.50, 0.25, 0.10],
  2: [0.60, 0.33, 0.15],
  3: [0.75, 0.40, 0.20],
};

function stateLevel(m) {
  if (m.cycle_type === 'anchor') {
    if (!m.next_anchor_date) return 0;
    const daysRem = calendarDaysUntil(m.next_anchor_date);
    if (daysRem > m.prep_window_days) return 0;
    return Math.min(10, ((m.prep_window_days - daysRem) / m.prep_window_days) * 10);
  }
  // open_decay: fractional days → live ticking
  const anchor = m.last_session_date || m.created_at || nowMs();
  const days = daysSinceFrac(anchor);
  return Math.min(10, m.last_observed_state + (m.decay_rate * days));
}
// Reset Effort = Sessions pro Ritual. 3 Sessions = ein voller Durchgang.
// sessionImpact: wieviel eine einzelne Session senkt.
// Ein Ritual (effort Sessions) deckt CRISIS_STATE State-Einheiten ab (8→0).
function sessionImpact(m) { return CRISIS_STATE / Math.max(1, m.reset_effort); }
const STATE_LABELS = [
  [0, 'Steril'],
  [2, 'Bisschen was'],
  [4, 'Normal'],
  [6, 'Stapelt sich'],
  [8, 'Alarmstufe'],
];
function stateLabel(sl) {
  const r = Math.round(sl);
  if (r <= 0) return STATE_LABELS[0][1];
  for (let i = STATE_LABELS.length - 1; i >= 0; i--) {
    if (r >= STATE_LABELS[i][0]) return STATE_LABELS[i][1];
  }
  return STATE_LABELS[0][1];
}
function sps(m) { return stateLevel(m) * m.criticality; }
function sessionsToZero(m) {
  const sl = stateLevel(m);
  if (sl <= 0) return 0;
  return Math.ceil(sl / sessionImpact(m));
}
function tierClass(spsVal) {
  if (spsVal >= 24) return 't-red';
  if (spsVal >= 16) return 't-yellow';
  if (spsVal >= 8) return 't-green';
  return 't-blue';
}

// ─── KAPAZITÄT (rollierendes 7-Tage-Fenster) ───────────────────────────────
const WINDOW_DAYS = 7;
function sessionsUsedInWindow() {
  const cutoff = nowMs() - WINDOW_DAYS * DAY_MS;
  return S.sessions.filter(s => s.ts >= cutoff && s.kind === 'session').length;
}
function windowBudget() {
  return S.config.sessions_per_day * WINDOW_DAYS;
}
function sessionsRemaining() {
  // Kann negativ werden (Überzug); kein hartes Cap nach oben — Cap entsteht natürlich durch Fenstergröße
  return +(windowBudget() - sessionsUsedInWindow()).toFixed(2);
}
function totalDemand() {
  return S.modules
    .filter(m => sps(m) >= S.config.min_sps_threshold)
    .reduce((sum, m) => sum + sessionsToZero(m), 0);
}
function actionThreshold(m) {
  return Math.max(STATE_LABELS[3][0], CRISIS_STATE - sessionImpact(m));
}
function daysToAction(m) {
  if (m.cycle_type !== 'decay' || m.decay_rate <= 0) return Infinity;
  const sl = stateLevel(m);
  const thresh = actionThreshold(m);
  if (sl >= thresh) return 0;
  return (thresh - sl) / m.decay_rate;
}
function upcomingSessions(horizonDays = 7) {
  const modules = [];
  let total = 0;
  for (const m of S.modules) {
    if (m.cycle_type !== 'decay' || m.decay_rate <= 0) continue;
    const dta = daysToAction(m);
    if (dta <= horizonDays) {
      modules.push({ id: m.id, name: m.name, days: dta, sessions: m.reset_effort });
      total += m.reset_effort;
    }
  }
  modules.sort((a, b) => a.days - b.days);
  return { total, modules };
}
function driftForecast() {
  const results = [];
  for (const m of S.modules) {
    const dp = driftPhase(m);
    if (!dp) continue;
    results.push({ id: m.id, name: m.name, days: dp.days, phase: dp.phase });
  }
  return results.sort((a, b) => a.days - b.days);
}
function statusMessage() {

  const avail = sessionsRemaining();
  const forecast = driftForecast();
  const inCrisis = forecast.filter(f => f.phase === 'krise').length;
  const urgent = forecast.filter(f => f.phase === 'eskaliert' || f.phase === 'kippt');
  const nextDrift = forecast.find(f => f.phase !== 'krise' && f.phase !== 'ruhig');
  const urgentCount = inCrisis + urgent.length;

  const over = -avail;
  const availLabel = avail.toFixed(1);
  const overLabel = over.toFixed(1);
  const due = upcoming.total;

  // ─── Über Rate ──
  if (avail <= 0) {
    if (inCrisis > 0) return { text: pickVariant([
      `${overLabel} über Rate, ${inCrisis} Module in der Krisenzone. Es brennt an mehreren Enden.`,
      `${overLabel} drüber und ${inCrisis} in Flammen. Triage-Modus.`,
      `${overLabel} über Rate, ${inCrisis} Modul${inCrisis>1?'e':''} im Krisenbereich. Das hier wird ein Lehrstück.`,
    ]), tone: 'crisis' };
    if (urgent.length > 0) return { text: pickVariant([

    if (over >= 3) return { text: pickVariant([

    ]), tone: 'crisis' };
    if (over > 0) return { text: pickVariant([

      `Leicht über Rate (${overLabel}). Im Auge behalten.`,
      `${overLabel} drüber. Knapp drüber, noch kein Drama.`,

    return { text: pickVariant([
      `Rate ausgeschöpft. Der Rest der Woche zeigt's.`,

  // ─── Mehr fällig als Budget ──
  if (due > avail) {
    if (inCrisis > 0) return { text: pickVariant([
      `${inCrisis} in Krise, ${due} Sessions fällig, nur ${availLabel} im Rahmen. Triage.`,
      `${due} Sessions stehen an, ${availLabel} verfügbar, ${inCrisis} brennen. Priorisieren.`,
    ]), tone: 'crisis' };
    return { text: pickVariant([
      `${due} Sessions fällig, nur ${availLabel} im Rahmen. Wird eng.`,
      `${due} Sessions diese Woche, ${availLabel} verfügbar. Knapp kalkuliert.`,
    ]), tone: 'crisis' };
  }

  // ─── Operative Lage ──
  if (inCrisis > 0) return { text: pickVariant([
    `${inCrisis} in der Krisenzone. ${availLabel} im Rahmen — Aufräum-Modus.`,
    `${inCrisis} im Krisenbereich. ${availLabel} verfügbar zum Räumen.`,
  ]), tone: 'neutral' };
  if (nextDrift) {
    const d = Math.ceil(nextDrift.days);
    if (d <= 1) return { text: pickVariant([
      `${nextDrift.name} kippt morgen. Jetzt oder garnicht.`,
      `${nextDrift.name} steht vor dem Kipppunkt. Letzter Aufruf.`,

    if (d <= 3) return { text: pickVariant([

  if (due > 0) return { text: pickVariant([

  const catchup = totalDemand();
  if (catchup > 0) return { text: pickVariant([

    `Stabil. ${availLabel} Sessions zum Aufpolieren übrig.`,
  ]), tone: 'good' };
  return { text: pickVariant([
    'Alles im Lot. Beruhigend langweilig.',
    'Nichts brennt. Genieß es.',
    'Alles ruhig im System. Die Konfiguration grüßt.',
  ]), tone: 'good' };
}

// Deterministische 10-Minuten-Rotation: kein Flicker bei live-tick, aber gelegentliche Variation
function pickVariant(arr) {
  if (!arr || arr.length === 0) return '';
  if (arr.length === 1) return arr[0];
  const idx = Math.floor(Date.now() / (10 * 60 * 1000)) % arr.length;
  return arr[idx];
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function doSession(modId) {
  const m = S.modules.find(x => x.id === modId);
  if (!m) return;
  const before = stateLevel(m);
  const after = +(before - sessionImpact(m)).toFixed(3); // darf negativ werden = Vorarbeit
  m.last_observed_state = after;
  m.last_session_date = nowMs();
  delete m.snoozed_until; // erledigt = kein "später" mehr
  S.sessions.push({
    id: uid(), kind: 'session', mod_id: m.id, mod_name: m.name,
    ts: nowMs(), state_before: +before.toFixed(3), state_after: +after.toFixed(3)
  });
  save(); render();
}
function doCrash(modId) {
  const m = S.modules.find(x => x.id === modId);
  if (!m || m.cycle_type === 'anchor') return;
  const before = stateLevel(m);
  const after = Math.min(10, before + 1);
  m.last_observed_state = after;
  m.last_session_date = nowMs();
  S.sessions.push({
    id: uid(), kind: 'crash', mod_id: m.id, mod_name: m.name,
    ts: nowMs(), state_before: +before.toFixed(3), state_after: +after.toFixed(3)
  });
  save(); render();
}

// Live param adjustment — no full re-render, just value display + debounced save
function adjustParamLive(modId, key, delta, min, max, decimals=2) {
  const m = S.modules.find(x => x.id === modId);
  if (!m) return;
  let v = (m[key] || 0) + delta;
  v = Math.max(min, Math.min(max, v));
  m[key] = +v.toFixed(decimals);
  const span = document.getElementById(`pv-${modId}-${key}`);
  if (span) span.textContent = m[key].toFixed(decimals);
  saveDebounced();
}
function adjustConfigLive(key, delta, min, max, decimals=0) {
  let v = (S.config[key] || 0) + delta;
  v = Math.max(min, Math.min(max, v));
  S.config[key] = decimals === 0 ? Math.round(v) : +v.toFixed(decimals);
  const span = document.getElementById(`cfg-${key}`);
  if (span) span.textContent = decimals === 0 ? S.config[key] : S.config[key].toFixed(decimals);
  saveDebounced();
}
function deleteModule(modId) {
  if (!confirm('Modul löschen?')) return;
  S.modules = S.modules.filter(x => x.id !== modId);
  save(); render();
}

// ─── HOLD-TO-REPEAT (EU4-style acceleration) ───────────────────────────────
function setupHoldRepeat(el, onTick) {
  let timer = null, elapsed = 0, active = false;
  function fire() {
    if (!active) return;
    onTick();
    elapsed += 50;
    // Acceleration: 100ms → 60ms → 30ms intervals
    const interval = elapsed < 600 ? 100 : elapsed < 1600 ? 60 : 30;
    timer = setTimeout(fire, interval);
  }
  function down(e) {
    if (active) return;
    if (e.cancelable) e.preventDefault();
    active = true; elapsed = 0;
    el.classList.add('holding');
    onTick();
    timer = setTimeout(fire, 320);
  }
  function up() {
    active = false;
    el.classList.remove('holding');
    if (timer) { clearTimeout(timer); timer = null; }
  }
  el.addEventListener('mousedown', down);
  el.addEventListener('touchstart', down, { passive: false });
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
  el.addEventListener('touchend', up);
  el.addEventListener('touchcancel', up);
}

// Schwere-Rang der Drift-Phase: akut zuerst. Anchor/ohne Phase → ganz hinten.
const PHASE_RANK = { krise: 0, kippt: 1, eskaliert: 2, driftet: 3, ruhig: 4 };
function phaseRank(dp) { if (!dp) return 5; const r = PHASE_RANK[dp.phase]; return r === undefined ? 4 : r; }

// Gemeinsame Routing-Wahrheit für Router (Cockpit) und Doing-Modus:
// gleiche Filterung + Sortierung, damit beide Oberflächen nie auseinanderdriften.
// Sortierung: Phase (Schwere) zuerst → innerhalb der Phase das, was zuerst kippt →
//   bei Gleichstand (z.B. alle schon in Krise) der höhere Druck. So überholt nie
//   etwas Driftendes etwas auf Alarmstufe, und im Krisen-Cluster kommen die
//   stärksten Brände zuerst statt in zufälliger Reihenfolge.
// forDoing=true blendet zusätzlich gesnoozte Module aus (nur im "Jetzt", nicht im Router).
function rankedModules(forDoing = false) {
  const now = nowMs();
  const filter = new Set(S.config.energy_filter);
  const structuralDeficit = upcomingSessions().total > sessionsRemaining();
  const mods = S.modules
    .filter(m => {
      if (stateLevel(m) < 0.001) return false;
      if (forDoing && m.snoozed_until && m.snoozed_until > now) return false;
      const dp = driftPhase(m);
      if (!dp) return true;
      // Defizit-Flag steuert nur die AUFNAHME ruhiger Module (proaktiv arbeiten), nicht die Reihenfolge.
      if (structuralDeficit) return true;
      return dp.phase !== 'ruhig';
    })
    .filter(m => filter.has(m.energy_cost))
    .sort((a, b) => {
      const da = driftPhase(a), db = driftPhase(b);
      const pa = phaseRank(da), pb = phaseRank(db);
      if (pa !== pb) return pa - pb;                       // 1. Schwere der Phase
      const ta = da ? da.days : Infinity, tb = db ? db.days : Infinity;
      if (Math.abs(ta - tb) > 0.001) return ta - tb;       // 2. wer zuerst kippt
      const crit = b.criticality - a.criticality;
      if (crit !== 0) return crit;                         // 3. höhere Criticality
      const spsDiff = sps(b) - sps(a);
      if (spsDiff !== 0) return spsDiff;                   // 4. höherer Druck
      // 5. länger ignoriert = höher
      const da2 = (now - (a.last_session_date || a.created_at)) / DAY_MS;
      const db2 = (now - (b.last_session_date || b.created_at)) / DAY_MS;
      return db2 - da2;
    });
  return { mods, structuralDeficit };
}

function toggleModuleDetail(modId) {
  if (expandedModuleId === modId) {
    collapseDetail();
    return;
  }
  if (expandedModuleId !== null) collapseDetail();
  const card = document.querySelector(`.module-card[data-live-card="${modId}"]`);
  if (!card) return;
  const m = S.modules.find(x => x.id === modId);
  if (!m) return;
  const html = buildCompactDetail(m);
  const detailDiv = document.createElement('div');
  detailDiv.className = 'module-detail';
  detailDiv.dataset.detailId = modId;
  detailDiv.innerHTML = html;
  card.parentNode.insertBefore(detailDiv, card.nextSibling);
  const sparkContainer = detailDiv.querySelector('[data-dd-spark]');
  if (sparkContainer) renderDetailSparkline(sparkContainer, m);
  expandedModuleId = modId;
  if (compactDetailInterval) clearInterval(compactDetailInterval);

function collapseDetail() {
  if (expandedModuleId === null) return;
  const detail = document.querySelector(`.module-detail[data-detail-id="${expandedModuleId}"]`);
  if (detail) detail.remove();
  if (compactDetailInterval) {
    clearInterval(compactDetailInterval);
    compactDetailInterval = null;

  expandedModuleId = null;
}

function buildCompactDetail(m) {
  const now = nowMs();
  const DAY = 86400000;
  const thirtyDaysAgo = now - 30 * DAY;
  const modLogs = S.sessions.filter(s => s.mod_id === m.id).sort((a, b) => a.ts - b.ts);
  const recentLogs = modLogs.filter(s => s.ts >= thirtyDaysAgo);
  const sessions30 = recentLogs.filter(s => s.kind === 'session').length;
  const crashes30 = recentLogs.filter(s => s.kind === 'crash').length;
  const sessionLogs = modLogs.filter(s => s.kind === 'session');
  const avgStateBefore = sessionLogs.length > 0
    ? (sessionLogs.reduce((sum, s) => sum + s.state_before, 0) / sessionLogs.length).toFixed(2)
    : null;
  const lastSessionLog = sessionLogs[sessionLogs.length - 1];
  const daysSinceSession = lastSessionLog
    ? ((now - lastSessionLog.ts) / DAY).toFixed(1) : null;
  const sl = stateLevel(m);
  let ttcText = '—';
  if (m.cycle_type === 'decay') {
    if (sl >= CRISIS_STATE) ttcText = 'Jetzt kritisch';
    else if (m.decay_rate > 0) ttcText = `${((CRISIS_STATE - sl) / m.decay_rate).toFixed(1)}d`;
  } else if (m.cycle_type === 'anchor' && m.next_anchor_date) {
    ttcText = `${calendarDaysUntil(m.next_anchor_date)}d bis Anker`;
  }
  const stz = sessionsToZero(m);
  const crashClass = crashes30 > 0 ? 'warn' : '';
  const params = m.cycle_type === 'decay'
    ? `Decay ${m.decay_rate.toFixed(2)}/d · Crit ×${m.criticality} · Energy ${m.energy_cost} · ${m.reset_effort} Sess/Rit`
    : `Anker ${m.next_anchor_date ? new Date(m.next_anchor_date).toLocaleDateString('de-CH') : '—'} · Prep ${m.prep_window_days}d · Crit ×${m.criticality} · Energy ${m.energy_cost}`;
  return `
    <div class="md-body">
      <div class="md-col">
        <div class="md-section-title">Zustand</div>
        <div class="md-stat-grid">
          <span class="md-label">Entropie</span>
          <span class="md-val mono" data-dd-state>${sl.toFixed(4)}</span>
          <span class="md-label">TTC</span>
          <span class="md-val mono ${sl >= 8 ? 'danger' : sl >= 5 ? 'warn' : ''}" data-dd-ttc>${ttcText}</span>
          ${stz > 0 ? `
          <span class="md-label">STZ</span>
          <span class="md-val mono" data-dd-stz>×${stz}</span>` : ''}
        </div>
      </div>
      <div class="md-col">
        <div class="md-section-title">Verlauf · 30d</div>
        <div class="md-stat-grid">
          <span class="md-label">Sessions</span>
          <span class="md-val mono accent">${sessions30}</span>
          <span class="md-label">Crashes</span>
          <span class="md-val mono ${crashClass}">${crashes30}</span>
          ${avgStateBefore !== null ? `
          <span class="md-label">Ø vor Session</span>
          <span class="md-val mono">${avgStateBefore}</span>` : ''}
          ${daysSinceSession !== null ? `
          <span class="md-label">Tage seit</span>
          <span class="md-val mono">${daysSinceSession}d</span>` : ''}
        </div>
      </div>
      <div class="md-full">
        <span class="md-params mono">${params}</span>
        <div class="md-spark" data-dd-spark></div>
      </div>
    </div>`;
}

function heatWindowDays() { return S.config.heat_window_days || 14; }

// Rekonstruiert den Entropie-Verlauf als sortierte Stützpunkte (ts, s) im Fenster.
function statePoints(m, fromTs, toTs) {
  const DAY = 86400000;
  const logs = S.sessions.filter(s => s.mod_id === m.id).sort((a, b) => a.ts - b.ts);
  const pts = [];
  const before = logs.filter(l => l.ts < fromTs);
  let startState;
  if (before.length > 0) {
    const last = before[before.length - 1];
    startState = m.cycle_type === 'decay'
      ? Math.min(10, last.state_after + m.decay_rate * ((fromTs - last.ts) / DAY))
      : 0;
  } else {
    startState = m.last_observed_state || 0;
  }
  pts.push({ ts: fromTs, s: startState });
  for (const log of logs.filter(l => l.ts >= fromTs && l.ts <= toTs)) {
    pts.push({ ts: log.ts, s: log.state_before });
    pts.push({ ts: log.ts + 500, s: log.state_after });
  }
  pts.push({ ts: toTs, s: stateLevel(m) });
  pts.sort((a, b) => a.ts - b.ts);
  return pts;
}

// Lineare Interpolation des Zustands zu einem Zeitpunkt (zwischen den Stützpunkten).
function stateAtTs(pts, ts) {
  if (ts <= pts[0].ts) return pts[0].s;
  const lastP = pts[pts.length - 1];
  if (ts >= lastP.ts) return lastP.s;
  for (let i = 1; i < pts.length; i++) {
    if (pts[i].ts >= ts) {
      const a = pts[i - 1], b = pts[i];
      const t = (ts - a.ts) / Math.max(1, b.ts - a.ts);
      return a.s + (b.s - a.s) * t;
    }
  }
  return lastP.s;
}

// Pro-Tag-Farbe (Zustand am Tagesende) als Tageskästchen. So ist das rechte Kästchen
// exakt der Jetzt-Zustand = linker Streifen. Krise (>= CRISIS_STATE) = Rot.
function heatSegments(m, fromTs, toTs, days) {
  const pts = statePoints(m, fromTs, toTs);
  const dayMs = (toTs - fromTs) / days;
  const cols = [];
  for (let d = 0; d < days; d++) {
    const sl = stateAtTs(pts, fromTs + (d + 1) * dayMs);
    cols.push(stateColor(m, sl));
  }
  return cols;
}

function heatBoxes(colors) {
  return colors.map(c => `<div class="heat-box" style="background:${c}"></div>`).join('');
}

// Detaillierte Heatbar fürs Accordion: Tageskästchen + Session-Marker + Zeitachse.
function buildDetailedHeatbar(m) {
  const now = nowMs();
  const days = heatWindowDays();
  const fromTs = now - days * 86400000;
  const span = now - fromTs;
  const boxes = heatBoxes(heatSegments(m, fromTs, now, days));
  const toPct = ts => ((ts - fromTs) / span) * 100;

  let markers = '';
  const sessions = S.sessions.filter(s => s.mod_id === m.id && s.kind === 'session' && s.ts >= fromTs && s.ts <= now);
  for (const slog of sessions) {
    markers += `<div class="heat-marker" style="left:${toPct(slog.ts).toFixed(2)}%"></div>`;
  }
  return `
    <div class="heat-track">${boxes}${markers}</div>
    <div class="heat-axis"><span>−${days}d</span><span>−${Math.round(days / 2)}d</span><span>jetzt</span></div>`;
}

function renderDetailSparkline(container, m) {
  container.innerHTML = buildDetailedHeatbar(m);
}

function tickCompactDetail(modId) {
  const detail = document.querySelector(`.module-detail[data-detail-id="${modId}"]`);

    else if (m.decay_rate > 0) ttcText = `${((CRISIS_STATE - sl) / m.decay_rate).toFixed(1)}d`;
  } else if (m.cycle_type === 'anchor' && m.next_anchor_date) {

  }
  const sparkEl = detail.querySelector('[data-dd-spark]');
  if (sparkEl) renderDetailSparkline(sparkEl, m);
}

// Live update on Router — text/class swaps, no full re-render
function tickLive() {
  if (view !== 'router') return;

  document.querySelectorAll('[data-live-card]').forEach(card => {
    const modId = card.dataset.liveCard;
    const m = S.modules.find(x => x.id === modId);
    if (!m) return;
    const sl = stateLevel(m);
    const spsVal = sps(m);
    const stz = sessionsToZero(m);

    const stateEl = card.querySelector('[data-live-state]');
    if (stateEl) stateEl.textContent = `Entropie ${sl.toFixed(4)}`;
    const spsEl = card.querySelector('[data-live-sps]');
    if (spsEl) spsEl.textContent = spsVal.toFixed(3);
    const stzEl = card.querySelector('[data-live-stz]');
    if (stzEl) stzEl.textContent = `×${stz}`;
    const stripe = card.querySelector('.tier-stripe');
    if (stripe) { stripe.className = 'tier-stripe'; stripe.style.background = stateColor(m, sl); }
    const driftEl = card.querySelector('[data-live-drift]');
    if (driftEl) {
      const { driftText, driftClass } = modStateStripData(m);
      driftEl.textContent = driftText;
      driftEl.className = `mod-state-drift ${driftClass}`;
    }
  });

  const upcoming = upcomingSessions();
  const budget = windowBudget();
  const used = sessionsUsedInWindow();
  const avail = sessionsRemaining();
  const forecast = driftForecast();
  const inCrisis = forecast.filter(f => f.phase === 'krise').length;
  const nextDrift = forecast.find(f => f.phase !== 'krise' && f.phase !== 'ruhig');
  const usedPct = (used / Math.max(0.01, budget)) * 100;
  const duePct = Math.min(100, ((used + upcoming.total) / Math.max(0.01, budget)) * 100);

  const msg = statusMessage();
  const hintEl = document.getElementById('live-status-hint');
  if (hintEl) {
    hintEl.textContent = msg.text;
    hintEl.className = `status-hint ${msg.tone}`;
  }
  const structEl = document.getElementById('live-structural');
  if (structEl) structEl.textContent = upcoming.total;
  const capEl = document.getElementById('live-cap');
  if (capEl) capEl.textContent = budget.toFixed(1);

  const driftLine = document.getElementById('live-drift-line');
  const driftVal = document.getElementById('live-drift-val');
  const driftText = document.getElementById('live-drift-text');
  if (driftLine) {
    if (inCrisis > 0) {
      driftLine.style.display = '';
      if (driftVal) { driftVal.textContent = inCrisis; driftVal.classList.remove('overdraft'); }
      if (driftText) driftText.textContent = 'Module in Krisenzone';
    } else if (nextDrift) {
      driftLine.style.display = '';
      if (driftVal) { driftVal.textContent = Math.ceil(nextDrift.days); driftVal.classList.remove('overdraft'); }
      if (driftText) driftText.textContent = `Tage bis ${nextDrift.name} driftet`;
    } else {
      driftLine.style.display = 'none';
    }
  }

  const usedEl = document.getElementById('live-used');
  if (usedEl) {
    usedEl.textContent = used;
    usedEl.classList.toggle('overdraft', avail < 0);
  }
  const usedTotalEl = document.getElementById('live-used-total');
  if (usedTotalEl) usedTotalEl.textContent = budget.toFixed(1);
  const rateEl = document.getElementById('live-rate');
  if (rateEl) rateEl.textContent = S.config.sessions_per_day.toFixed(2);

  const usedBar = document.getElementById('live-bar-used');
  if (usedBar) {
    usedBar.style.width = `${Math.min(100, usedPct)}%`;
    usedBar.classList.toggle('overdraft', used > budget);
  }
  const structTick = document.getElementById('live-bar-structural');
  if (structTick) {
    structTick.style.left = `${duePct}%`;
    structTick.classList.toggle('over', (used + upcoming.total) > budget);
    structTick.style.display = upcoming.total > 0 ? 'block' : 'none';
  }
}

// ─── DOING-MODUS (F8) ───────────────────────────────────────────────────────
// Condition-awareness statt SPS-Zahlen: fühlbarer Zustand + Dringlichkeit, deadpan.
function doingCondition(m) {
  const label = stateLabel(stateLevel(m));
  const dp = driftPhase(m);
  if (!dp) {
    if (m.cycle_type === 'anchor' && m.next_anchor_date) {
      return { text: `Anker in ${calendarDaysUntil(m.next_anchor_date)}d`, cls: '' };
    }
    return { text: label, cls: '' };
  }
  switch (dp.phase) {
    case 'krise':     return { text: `${label} · in der Krisenzone`, cls: 'crisis' };
    case 'kippt':     return { text: `${label} · kippt in ${dp.days.toFixed(1)}d`, cls: 'crisis' };
    case 'eskaliert': return { text: `${label} · eskaliert, ~${Math.ceil(dp.days)}d`, cls: 'warn' };
    case 'driftet':   return { text: `${label} · driftet, ~${Math.ceil(dp.days)}d Puffer`, cls: '' };
    case 'ruhig':     return { text: `${label} · ruhig`, cls: '' };
  }
  return { text: label, cls: '' };
}

      const set = new Set(S.config.energy_filter);
      if (set.has(e)) set.delete(e); else set.add(e);
      if (set.size === 0) set.add(e);
      S.config.energy_filter = [...set];

// ─── POMODORO (F8) ───────────────────────────────────────────────────────────
// In-session Timer, 25 min atomare Einheit. Kein Reminder/Notification.
const POMODORO_SEC = 25 * 60;
let pomo = null; // { modId, remaining, paused, interval }

function startPomodoro(modId) {
  const m = S.modules.find(x => x.id === modId);
  if (!m) return;
  if (pomo && pomo.interval) clearInterval(pomo.interval);
  pomo = { modId, remaining: POMODORO_SEC, paused: false, interval: null };
  document.getElementById('pomo-mod').textContent = m.name;
  document.getElementById('pomo-pause').textContent = 'Pause';
  document.getElementById('pomo-state').textContent = 'Fokus';
  document.getElementById('pomo-done').classList.remove('pulse');
  document.getElementById('pomo-time').classList.remove('done');
  renderPomoTime();
  document.getElementById('pomo-overlay').classList.add('show');
  pomo.interval = setInterval(pomoTick, 1000);
}
function pomoTick() {
  if (!pomo || pomo.paused) return;
  pomo.remaining = Math.max(0, pomo.remaining - 1);
  renderPomoTime();
  if (pomo.remaining === 0) {
    clearInterval(pomo.interval); pomo.interval = null;
    document.getElementById('pomo-state').textContent = 'Zeit um — als erledigt loggen?';
    document.getElementById('pomo-time').classList.add('done');
    document.getElementById('pomo-done').classList.add('pulse');
  }
}
function renderPomoTime() {
  if (!pomo) return;
  const mm = String(Math.floor(pomo.remaining / 60)).padStart(2, '0');
  const ss = String(pomo.remaining % 60).padStart(2, '0');
  document.getElementById('pomo-time').textContent = `${mm}:${ss}`;
}
function pomoPauseToggle() {
  if (!pomo || pomo.remaining === 0) return;
  pomo.paused = !pomo.paused;
  document.getElementById('pomo-pause').textContent = pomo.paused ? 'Weiter' : 'Pause';
  document.getElementById('pomo-state').textContent = pomo.paused ? 'Pausiert' : 'Fokus';
}
function pomoFinish() {
  if (!pomo) return;
  const id = pomo.modId;
  closePomodoro();
  doSession(id); // loggt Session + re-rendert aktuelle View
}
function closePomodoro() {
  if (pomo && pomo.interval) clearInterval(pomo.interval);
  pomo = null;
  document.getElementById('pomo-overlay').classList.remove('show');
  document.getElementById('pomo-done').classList.remove('pulse');
  document.getElementById('pomo-time').classList.remove('done');
}

// Wisch-Geste (Touch + Maus). Erkennt horizontal vs. vertikal, damit Scrollen nicht stört.
function setupSwipe(el, onSwipe) {
  let startX = 0, startY = 0, dx = 0, dragging = false, decided = false, horizontal = false;
  const THRESH = 90;
  function start(x, y) { startX = x; startY = y; dx = 0; dragging = true; decided = false; horizontal = false; el.style.transition = 'none'; }
  function move(x, y, e) {
    if (!dragging) return;
    const mx = x - startX, my = y - startY;
    if (!decided && (Math.abs(mx) > 8 || Math.abs(my) > 8)) {
      decided = true;
      horizontal = Math.abs(mx) > Math.abs(my);
    }
    if (decided && horizontal) {
      if (e && e.cancelable) e.preventDefault();
      dx = mx;
      el.style.transform = `translateX(${dx}px)`;
      el.style.opacity = String(Math.max(0.25, 1 - Math.abs(dx) / 320));
    }
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    el.style.transition = 'transform 0.2s, opacity 0.2s';
    if (horizontal && Math.abs(dx) > THRESH) {
      const dir = dx > 0 ? 1 : -1;
      el.style.transform = `translateX(${dir * window.innerWidth}px)`;
      el.style.opacity = '0';
      setTimeout(onSwipe, 170);
    } else {
      el.style.transform = '';
      el.style.opacity = '';
    }
  }
  el.addEventListener('touchstart', e => { const t = e.touches[0]; start(t.clientX, t.clientY); }, { passive: true });
  el.addEventListener('touchmove', e => { const t = e.touches[0]; move(t.clientX, t.clientY, e); }, { passive: false });
  el.addEventListener('touchend', end);
  el.addEventListener('touchcancel', end);
  el.addEventListener('mousedown', e => {
    start(e.clientX, e.clientY);
    const mm = ev => move(ev.clientX, ev.clientY, ev);
    const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); end(); };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });
}

// Phase für einen BELIEBIGEN Zustandswert (nicht nur den aktuellen) — Basis für
// historische Tageskästchen, damit Box-Farbe, Streifen und Label dieselbe Quelle haben.
function phaseForState(m, sl) {
  if (m.cycle_type !== 'decay' || m.decay_rate <= 0) return null;
  if (sl >= CRISIS_STATE) return { days: 0, ratio: 0, phase: 'krise' };
  const days = (CRISIS_STATE - sl) / m.decay_rate;
  const cycleTime = CRISIS_STATE / m.decay_rate;
  const ratio = days / cycleTime;
  const [ruhig, driftet, eskaliert] = DRIFT_BANDS[m.criticality] || DRIFT_BANDS[1];
  let phase;
  // Absoluter Floor: "Ruhig" nur wenn auch zeitlich Puffer da ist (≥2 Tage), "Driftet" nur ≥1 Tag.
  // Verhindert dass kurzzyklische Module (z.B. Wäsche, 1.6d-Zyklus) trotz akuter Nähe zur Krise "Ruhig" heißen.
  if (ratio > ruhig && days > 2) phase = 'ruhig';
  else if (ratio > driftet && days > 1) phase = 'driftet';
  else if (ratio > eskaliert) phase = 'eskaliert';
  else phase = 'kippt';
  return { days, ratio, phase };
}

function driftPhase(m) { return phaseForState(m, stateLevel(m)); }

// EINE Schwere-Sprache: Phase -> Farbe. Dieselbe Quelle wie Label ("Kippt/Krisenzone")
// und Sortierung. Rot = Krise/kippt = jetzt handeln. Wird für Streifen UND Kästchen genutzt.
const PHASE_COLOR = {
  krise:     '#f43f5e',
  kippt:     '#f43f5e',
  eskaliert: '#fb923c',
  driftet:   '#fbbf24',
  ruhig:     '#4ade80',
};
function stateColor(m, sl) {
  const dp = phaseForState(m, sl);
  if (dp) return PHASE_COLOR[dp.phase] || '#4a9eff';
  return sl >= CRISIS_STATE ? '#f43f5e' : '#4a9eff';
}

function modStateStripData(m) {
  const sl = stateLevel(m);
  const spsVal = sps(m);
  const stripColor = stateColor(m, sl);
  let driftText = '—', driftClass = '';
  const dp = driftPhase(m);
  if (dp) {
    switch (dp.phase) {
      case 'ruhig':     driftText = `Ruhig · ${dp.days.toFixed(1)}d`; driftClass = ''; break;
      case 'driftet':   driftText = `Driftet · ${dp.days.toFixed(1)}d`; driftClass = ''; break;
      case 'eskaliert': driftText = `Eskaliert · ${dp.days.toFixed(1)}d`; driftClass = 'warn'; break;
      case 'kippt':     driftText = `Kippt · ${dp.days.toFixed(1)}d`; driftClass = 'crisis'; break;
      case 'krise':     driftText = 'Krisenzone'; driftClass = 'crisis'; break;
    }
  }
  return { sl, spsVal, stripColor, driftText, driftClass };
}

// ─── ANALYSIS / INSIGHTS ──────────────────────────────────────────────────
function computeAnalysisData() {
  const now = Date.now();
  const DAY = 86400000;
  const THIRTY = now - 30 * DAY;

  const sessions30 = S.sessions.filter(s => s.kind === 'session' && s.ts >= THIRTY);
  const crashes30 = S.sessions.filter(s => s.kind === 'crash' && s.ts >= THIRTY);
  const totalSessions30 = sessions30.length;
  const totalCrashes30 = crashes30.length;

  const systemStability = totalSessions30 > 0
    ? Math.round((1 - totalCrashes30 / Math.max(1, totalSessions30)) * 100)
    : 100;
  const effectiveRate = totalSessions30 > 0 ? +(totalSessions30 / 30).toFixed(2) : 0;
  const configuredRate = S.config.sessions_per_day;
  const rateDelta = +(effectiveRate - configuredRate).toFixed(2);
  const upcoming = upcomingSessions();
  const budget = windowBudget();
  const used = sessionsUsedInWindow();
  const avail = sessionsRemaining();
  const usagePct = budget > 0 ? Math.round((used / budget) * 100) : 0;
  const coverage = upcoming.total > 0 ? Math.round((avail / upcoming.total) * 100) : 100;
  const avgDailyDemand = S.modules
    .filter(m => m.cycle_type === 'decay' && m.decay_rate > 0)
    .reduce((sum, m) => sum + (m.decay_rate * m.reset_effort / CRISIS_STATE), 0);
  const steadyState = configuredRate >= avgDailyDemand;

  let recommendation = '', recClass = 'info';
  if (totalSessions30 < 7) {
    recommendation = 'Noch zu wenig Daten für verlässliche Aussagen (mind. 7 Tage Nutzung).';
    recClass = 'warn';
  } else if (!steadyState) {
    recommendation =
      `${upcoming.total} Sessions fällig, nur ${avail.toFixed(1)} im Rahmen. ` +
      `Rate erhöhen oder Module reduzieren.`;
    recClass = 'crisis';
  } else if (rateDelta > 0.5) {
    recommendation =
      `Du liegst ${rateDelta.toFixed(2)}/d über der eingestellten Rate. ` +
      `Rate in den Settings auf ${effectiveRate.toFixed(2)} erhöhen, damit die Prognose stimmt.`;
    recClass = 'warn';
  } else if (rateDelta < -0.3) {
    recommendation =
      `Luft nach oben: ${(-rateDelta).toFixed(2)}/d ungenutzt. Mehr Sessions würden das System weiter entlasten.`;
    recClass = 'info';
  } else {
    recommendation = 'System im Gleichgewicht. Die aktuelle Rate trägt den Steady-State. Weiter so.';
    recClass = 'ok';
  }

  const moduleInsights = S.modules
    .filter(m => m.cycle_type === 'decay')
    .map(m => {
      const modSess = sessions30.filter(s => s.mod_id === m.id);
      const modCrash = crashes30.filter(s => s.mod_id === m.id);
      const sessionCount = modSess.length;
      const crashCount = modCrash.length;
      const stability = sessionCount > 0
        ? Math.round((1 - crashCount / Math.max(1, sessionCount)) * 100)
        : 100;
      const avgStateBefore = sessionCount > 0
        ? (modSess.reduce((sum, s) => sum + s.state_before, 0) / sessionCount)
        : null;
      const lastSession = sessionCount > 0 ? modSess[modSess.length - 1] : null;
      const daysSince = lastSession ? ((now - lastSession.ts) / DAY).toFixed(1) : null;

      const sortedAll = [...modSess, ...modCrash].sort((a, b) => a.ts - b.ts);
      const recoveryTimes = [];
      for (let i = 0; i < sortedAll.length - 1; i++) {
        if (sortedAll[i].kind === 'crash' && sortedAll[i+1].kind === 'session') {
          recoveryTimes.push((sortedAll[i+1].ts - sortedAll[i].ts) / DAY);
        }
      }
      const avgRecovery = recoveryTimes.length > 0
        ? (recoveryTimes.reduce((a, b) => a + b, 0) / recoveryTimes.length).toFixed(1)
        : null;

      const dta = daysToAction(m);
      const isDue = dta <= 7;
      const cycleDays = m.decay_rate > 0 ? CRISIS_STATE / m.decay_rate : Infinity;
      const expectedIn30 = cycleDays > 0 ? Math.floor(30 / cycleDays) : 0;
      const demandMet = expectedIn30 > 0 ? Math.min(100, Math.round((sessionCount / expectedIn30) * 100)) : 100;

      // Trend: steigt der Ø state_before über die Zeit? (erste 5 vs letzte 5 Sessions)
      let trendText = '—';
      if (sessionCount >= 10) {
        const first5 = modSess.slice(0, 5).reduce((s, x) => s + x.state_before, 0) / 5;
        const last5 = modSess.slice(-5).reduce((s, x) => s + x.state_before, 0) / 5;
        trendText = last5 > first5 + 0.5 ? 'steigend' : last5 < first5 - 0.5 ? 'fallend' : 'stabil';
      }

      const tier = stability > 75 ? 'green' : stability > 40 ? 'yellow' : 'red';
      const classification = stability > 75 ? 'Stabil'
        : stability > 40 ? 'Schwankend' : 'Dauerbaustelle';

      return {
        m, sessionCount, crashCount, stability, tier, classification,
        avgStateBefore: avgStateBefore !== null ? avgStateBefore.toFixed(2) : null,
        daysSince,
        avgRecovery,
        demandMet,
        crashFreq: crashCount > 0 ? +(crashCount / 30 * 7).toFixed(1) : null,
        trendText,
      };
    })
    .sort((a, b) => b.stability - a.stability)
    .map((item, idx) => ({ ...item, rank: idx + 1 }));

  return {
    systemStability, effectiveRate, configuredRate, rateDelta,
    upcoming, budget, used, usagePct, coverage, steadyState, recommendation, recClass,
    totalSessions30, totalCrashes30, moduleInsights
  };
}

let analysisExpandedId = null;

function renderAnalysis() {
  const data = computeAnalysisData();
  let html = `<div class="analysis-page">`;

  // ── System-Report ──
  html += `<div class="analysis-section">
    <div class="analysis-section-title">System-Report</div>`;

  // Balken: Rahmennutzung
  const usageClass = data.usagePct > 90 ? 'red' : data.usagePct > 75 ? 'yellow' : 'green';
  html += `<div class="analysis-bar">
    <span class="analysis-bar-label">Rahmen</span>
    <div class="analysis-bar-track"><div class="analysis-bar-fill ${usageClass}" style="width:${data.usagePct}%"></div></div>
    <span class="analysis-bar-pct">${data.usagePct}%</span>
  </div>`;

  // Balken: Bedarfsdeckung
  const coverClass = data.coverage < 60 ? 'red' : data.coverage < 85 ? 'yellow' : 'green';
  html += `<div class="analysis-bar">
    <span class="analysis-bar-label">Bedarfsdeckung</span>
    <div class="analysis-bar-track"><div class="analysis-bar-fill ${coverClass}" style="width:${Math.min(100, data.coverage)}%"></div></div>
    <span class="analysis-bar-pct" data-tt="coverage">${data.coverage}%</span>
  </div>`;

  // Balken: System-Stabilität
  const stabClass = data.systemStability < 60 ? 'red' : data.systemStability < 85 ? 'yellow' : 'green';
  html += `<div class="analysis-bar">
    <span class="analysis-bar-label">Stabilität</span>
    <div class="analysis-bar-track"><div class="analysis-bar-fill ${stabClass}" style="width:${data.systemStability}%"></div></div>
    <span class="analysis-bar-pct" data-tt="stability">${data.systemStability}%</span>
  </div>`;

  // Stat-Zeile
  const steadyIcon = data.steadyState ? '\u2705' : '\u26A0\uFE0F';
  html += `<div style="margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);line-height:1.7">
    ${steadyIcon} Steady-State: <strong style="color:var(--text)" data-tt="steadystate">${data.steadyState ? 'erreicht' : 'nicht erreicht'}</strong>
    &middot; Effektiv ${data.effectiveRate}/d (eingestellt ${data.configuredRate}/d)
    &middot; ${data.totalSessions30} Sessions / ${data.totalCrashes30} Crashes (30d)
  </div>`;

  // Empfehlung
  html += `<div class="analysis-rec ${data.recClass}">${data.recommendation}</div>`;
  html += `</div>`;

  // ── Modul-Rangliste ──
  html += `<div class="analysis-section">
    <div class="analysis-section-title">Modul-Rangliste (nach Stabilität)</div>`;

  if (data.moduleInsights.length === 0) {
    html += `<div class="empty">Keine Decay-Module vorhanden</div>`;
  } else {
    for (const ins of data.moduleInsights) {
      const badgeClass = ins.tier;
      const isExpanded = analysisExpandedId === ins.m.id;

      html += `<div class="analysis-mod-card" data-toggle-analysis="${ins.m.id}">
        <span class="analysis-mod-rank">#${ins.rank}</span>
        <span class="analysis-mod-name">${escapeHtml(ins.m.name)}</span>
        <div class="analysis-mod-bar"><div class="analysis-mod-fill ${badgeClass}" style="width:${ins.stability}%"></div></div>
        <span class="analysis-mod-pct">${ins.stability}%</span>
        <span class="analysis-mod-badge ${badgeClass}">${ins.classification}</span>
      </div>`;

      // Expandiertes Detail
      html += `<div class="analysis-mod-detail ${isExpanded ? 'show' : ''}" data-analysis-detail="${ins.m.id}">`;
      html += `<div class="analysis-detail-grid">`;

      html += `<span class="analysis-detail-label">Stabilität</span>
        <span class="analysis-detail-val">${ins.stability}% (${ins.classification})</span>`;

      if (ins.crashFreq !== null) {
        html += `<span class="analysis-detail-label">Crashs/Woche</span>
          <span class="analysis-detail-val ${ins.crashFreq > 1 ? 'warn' : ''}">${ins.crashFreq}</span>`;
      }
      if (ins.avgStateBefore !== null) {
        html += `<span class="analysis-detail-label">Ø State vorher</span>
          <span class="analysis-detail-val">${ins.avgStateBefore}</span>`;
      }
      if (ins.trendText !== '—') {
        html += `<span class="analysis-detail-label">Trend</span>
          <span class="analysis-detail-val ${ins.trendText === 'steigend' ? 'warn' : 'accent'}">${ins.trendText}</span>`;
      }
      if (ins.daysSince !== null) {
        html += `<span class="analysis-detail-label">Zuletzt</span>
          <span class="analysis-detail-val">vor ${ins.daysSince}d</span>`;
      }
      if (ins.avgRecovery !== null) {
        html += `<span class="analysis-detail-label">Erholung</span>
          <span class="analysis-detail-val">${ins.avgRecovery}d nach Crash</span>`;
      }
      html += `<span class="analysis-detail-label">Bedarfsdeckung</span>
        <span class="analysis-detail-val ${ins.demandMet < 60 ? 'warn' : 'accent'}">${ins.demandMet}%</span>`;

      html += `</div></div>`; // ende detail-grid + detail-div
    }
  }
  html += `</div>`; // ende analysis-section modul-rangliste

  // ── Prognostische Insights (Crunchy) ──
  html += `<div class="analysis-section">
    <div class="analysis-section-title">Prognose & Trends</div>`;

  // Chaos-Schleifen erkennen
  const loopModules = data.moduleInsights
    .filter(ins => ins.crashCount > 2)
    .map(ins => `${escapeHtml(ins.m.name)} (${ins.crashCount}x)`);
  if (loopModules.length > 0) {
    html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t-red);line-height:1.6;margin-bottom:6px">
      \u26A0 Chaos-Schleife: ${loopModules.join(', ')} — immer wieder in 8+ gerutscht.</div>`;
  }

  // Nächster Drift (aus driftForecast)
  const drift = driftForecast();
  const nextKippt = drift.find(f => f.phase === 'kippt');
  if (nextKippt) {
    html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t-yellow);line-height:1.6;margin-bottom:6px">
      \u231A Nächster Kipppunkt: <strong>${escapeHtml(nextKippt.name)}</strong> in ${nextKippt.days.toFixed(1)}d</div>`;
  }

  // Steady-State-Prognose
  data.moduleInsights.forEach(ins => {
    if (ins.stability < 40 && ins.crashCount > 0) {
      html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);line-height:1.6;margin-bottom:4px">
        \u{1F4C9} <strong>${escapeHtml(ins.m.name)}</strong>: kippt dauerhaft.
        ${ins.m.decay_rate > 1 ? 'Decay-Rate (' + ins.m.decay_rate.toFixed(2) + '/d) könnte zu hoch sein.' : ''}
        ${ins.demandMet < 60 ? 'Bekommt nur ' + ins.demandMet + '% der nötigen Sessions.' : ''}</div>`;
    }
    // Stabilitäts-Empfehlung
    if (ins.stability >= 80 && ins.avgStateBefore !== null && parseFloat(ins.avgStateBefore) < 4) {
      html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t-green);line-height:1.6;margin-bottom:4px">
        \u2705 <strong>${escapeHtml(ins.m.name)}</strong>: läuft sauber — greifst früh genug ein (Ø ${ins.avgStateBefore} vor Session).</div>`;
    }
  });
  html += `</div>`; // ende analyse-section prognose

  html += `</div>`; // ende analysis-page
  main.innerHTML = html;

  // Event-Handler: Modul-Karten Toggle
  document.querySelectorAll('[data-toggle-analysis]').forEach(el => {
    el.onclick = () => toggleAnalysisDetail(el.dataset.toggleAnalysis);
  });
  ttBind(main);
}

function toggleAnalysisDetail(modId) {
  const was = analysisExpandedId;
  // Altes schließen
  if (was) {
    const old = document.querySelector(`[data-analysis-detail="${was}"]`);
    if (old) old.classList.remove('show');
  }
  if (was === modId) {
    analysisExpandedId = null;
    return;
  }
  // Neues öffnen
  const detail = document.querySelector(`[data-analysis-detail="${modId}"]`);
  if (detail) {
    detail.classList.add('show');
    analysisExpandedId = modId;
  }
}

function loadPreset(key) {
  const preset = PRESETS[key];
  if (!preset) return;
  if (!confirm(`Preset "${preset.label}" laden? Module + Log werden ersetzt.`)) return;
  const now = nowMs();
  S.modules = preset.modules.map(p => ({
    id: uid(), created_at: now, last_session_date: now,
    ...p
  }));
  S.sessions = [];
  save(); render();
}
window.loadPreset = loadPreset;

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sdsd-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!parsed.modules || !parsed.sessions) throw 0;
        if (!confirm('Aktuelle Daten überschreiben?')) return;
        S = { ...clone(DEFAULTS), ...parsed, config: { ...DEFAULTS.config, ...(parsed.config || {}) } };
        save(); render();
      } catch(e) { alert('Ungültige Datei'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function resetAll() {
  if (!confirm('Alle Daten löschen?')) return;
  localStorage.removeItem(STORAGE_KEY);
  S = clone(DEFAULTS);
  render();
}
window.exportData = exportData;
window.importData = importData;
window.resetAll = resetAll;

// ─── SYNC-KONFLIKT (optimistic concurrency) ──────────────────────────────────
// Erscheint nur, wenn ein anderes Gerät seit unserem letzten Sync geschrieben hat.
function showConflictModal() {
  modalEl.innerHTML = `
    <h2>Sync-Konflikt</h2>
    <p style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:4px;">
      Auf einem anderen Gerät wurde zwischenzeitlich geändert. Deine Änderung hier ist noch nicht hochgeladen. Was soll gelten?
    </p>
    <div class="modal-actions">
      <button onclick="resolveConflictKeepCloud()">Cloud laden<br><span style="font-size:9px;color:var(--text-faint)">diese Änderung verwerfen</span></button>
      <button class="primary" onclick="resolveConflictKeepLocal()">Meinen Stand<br><span style="font-size:9px;">Cloud überschreiben</span></button>
    </div>`;
  modalBg.classList.add('show');
}
async function resolveConflictKeepLocal() {
  closeModal();
  S.updated_at = nowMs();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  setSyncStatus('busy');
  try { await cloudWrite(); setSyncStatus('ok'); }
  catch (e) { setSyncStatus('off'); }
}
async function resolveConflictKeepCloud() {
  closeModal();
  setSyncStatus('busy');
  try {
    const res = await fetch(`${CLOUD_ENDPOINT}?id=eq.${CLOUD_ROW_ID}&select=data`, { headers: CLOUD_HEADERS });
    const rows = await res.json();
    if (rows.length) {
      const remote = rows[0].data || {};
      S = { ...clone(DEFAULTS), ...remote, config: { ...DEFAULTS.config, ...(remote.config || {}) } };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
      cloudBaseTs = remote.updated_at || 0;
      cloudDirty = false;
      render();
    }
    setSyncStatus('ok');
  } catch (e) { setSyncStatus('off'); }
}

let detailInterval = null;

function tickDetail(modId) {
  const m = S.modules.find(x => x.id === modId);
  if (!m || !modalBg.classList.contains('show')) return;
  const sl = stateLevel(m);
  const spsVal = sps(m);
  const tier = tierClass(spsVal);
  const tierColors = { 't-blue': 'var(--t-blue)', 't-green': 'var(--t-green)', 't-yellow': 'var(--t-yellow)', 't-red': 'var(--t-red)' };

  const spsEl = modalEl.querySelector('[data-d-sps]');
  if (spsEl) { spsEl.textContent = spsVal.toFixed(1); spsEl.style.color = tierColors[tier] || 'var(--text-faint)'; }

  const stateEl = modalEl.querySelector('[data-d-state]');
  if (stateEl) stateEl.textContent = sl.toFixed(4);

  let ttcText = '—';
  if (m.cycle_type === 'decay') {
    if (sl >= CRISIS_STATE) ttcText = 'Jetzt kritisch';
    else if (m.decay_rate > 0) ttcText = `${((CRISIS_STATE - sl) / m.decay_rate).toFixed(1)}d`;
  } else if (m.cycle_type === 'anchor' && m.next_anchor_date) {
    ttcText = `${calendarDaysUntil(m.next_anchor_date)}d bis Anker`;
  }
  const ttcEl = modalEl.querySelector('[data-d-ttc]');
