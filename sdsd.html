    ttcEl.className = `detail-stat-val ${sl >= 8 ? 'danger' : sl >= 5 ? 'warn' : ''}`;
  }

  const stzEl = modalEl.querySelector('[data-d-stz]');
  if (stzEl) stzEl.textContent = `×${sessionsToZero(m)}`;
}

function openDetailView(modId) {
  const m = S.modules.find(x => x.id === modId);
  if (!m) return;
  const now = Date.now();
  const DAY = 86400000;
  const thirtyDaysAgo = now - 30 * DAY;

  const modLogs = S.sessions.filter(s => s.mod_id === modId).sort((a, b) => a.ts - b.ts);
  const recentLogs = modLogs.filter(s => s.ts >= thirtyDaysAgo);
  const sessions30 = recentLogs.filter(s => s.kind === 'session').length;
  const crashes30 = recentLogs.filter(s => s.kind === 'crash').length;

  const sessionLogs = modLogs.filter(s => s.kind === 'session');
  const avgStateBefore = sessionLogs.length > 0
    ? (sessionLogs.reduce((sum, s) => sum + s.state_before, 0) / sessionLogs.length).toFixed(2)
    : null;
  const lastSessionLog = sessionLogs[sessionLogs.length - 1];
  const daysSinceSession = lastSessionLog
    ? ((now - lastSessionLog.ts) / DAY).toFixed(1)
    : null;

  const sl = stateLevel(m);
  const spsVal = sps(m);
  const tier = tierClass(spsVal);
  const tierColors = { 't-blue': 'var(--t-blue)', 't-green': 'var(--t-green)', 't-yellow': 'var(--t-yellow)', 't-red': 'var(--t-red)' };
  const tierColor = tierColors[tier] || 'var(--text-faint)';

  let ttcText = '—';
  if (m.cycle_type === 'decay') {
    if (sl >= CRISIS_STATE) ttcText = 'Jetzt kritisch';
    else if (m.decay_rate > 0) ttcText = `${((CRISIS_STATE - sl) / m.decay_rate).toFixed(1)}d`;
  } else if (m.cycle_type === 'anchor' && m.next_anchor_date) {
    ttcText = `${calendarDaysUntil(m.next_anchor_date)}d bis Anker`;
  }

  const sparkSvg = buildSparkline(m, modLogs, thirtyDaysAgo, now);
  const stz = sessionsToZero(m);

  modalEl.innerHTML = `
    <div class="detail-header">
      <span class="detail-mod-name">${escapeHtml(m.name)}</span>
      <span class="mod-druck"><span class="mod-druck-cap">Druck</span><span class="detail-sps" data-d-sps style="color:${tierColor}">${spsVal.toFixed(1)}</span></span>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Zustand</div>
      <div class="detail-stat-grid">
        <span class="detail-stat-label">Entropie aktuell</span>
        <span class="detail-stat-val" data-d-state>${sl.toFixed(4)}</span>
        <span class="detail-stat-label">Time-to-Critical</span>
        <span class="detail-stat-val ${sl >= 8 ? 'danger' : sl >= 5 ? 'warn' : ''}" data-d-ttc>${ttcText}</span>
        ${stz > 0 ? `
        <span class="detail-stat-label">Sessions to Zero</span>
        <span class="detail-stat-val" data-d-stz>×${stz}</span>` : ''}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Verlauf · 30 Tage</div>
      <div class="sparkline-wrap">${sparkSvg}</div>
      <div class="detail-stat-grid">
        <span class="detail-stat-label">Sessions</span>
        <span class="detail-stat-val accent">${sessions30}</span>
        <span class="detail-stat-label">Crashes</span>
        <span class="detail-stat-val ${crashes30 > 0 ? 'warn' : ''}">${crashes30}</span>
        ${avgStateBefore !== null ? `
        <span class="detail-stat-label">Ø Entropie vor Session</span>
        <span class="detail-stat-val">${avgStateBefore}</span>` : ''}
        ${daysSinceSession !== null ? `
        <span class="detail-stat-label">Tage seit Session</span>
        <span class="detail-stat-val">${daysSinceSession}d</span>` : ''}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Parameter</div>
      <div class="detail-stat-grid">
        ${m.cycle_type === 'decay' ? `
        <span class="detail-stat-label">Decay Rate</span>
        <span class="detail-stat-val">${m.decay_rate.toFixed(2)}/d</span>` : `
        <span class="detail-stat-label">Anker</span>
        <span class="detail-stat-val">${m.next_anchor_date ? new Date(m.next_anchor_date).toLocaleDateString('de-CH') : '—'}</span>
        <span class="detail-stat-label">Prep Window</span>
        <span class="detail-stat-val">${m.prep_window_days}d</span>`}
        <span class="detail-stat-label">Criticality</span>
        <span class="detail-stat-val">×${m.criticality}</span>
        <span class="detail-stat-label">Energy</span>
        <span class="detail-stat-val">${m.energy_cost}</span>
        <span class="detail-stat-label">Sessions/Ritual</span>
        <span class="detail-stat-val">${m.reset_effort}</span>
      </div>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Schließen</button>
    </div>
  `;
  modalBg.classList.add('show');
  if (detailInterval) clearInterval(detailInterval);
  detailInterval = setInterval(() => tickDetail(modId), 1000);
}

function buildSparkline(m, logs, fromTs, toTs) {
  const W = 280, H = 48;
  const span = toTs - fromTs;
  if (span <= 0) return '';
  const toX = ts => Math.max(0, Math.min(W, ((ts - fromTs) / span) * W));
  const toY = state => H - (Math.min(10, Math.max(0, state)) / 10) * H;

  const pts = [];
  const logsBefore = logs.filter(l => l.ts < fromTs);
  let startState;
  if (logsBefore.length > 0) {
    const last = logsBefore[logsBefore.length - 1];
    startState = m.cycle_type === 'decay'
      ? Math.min(10, last.state_after + m.decay_rate * ((fromTs - last.ts) / 86400000))
      : 0;
  } else {
    startState = m.last_observed_state || 0;
  }
  pts.push({ ts: fromTs, s: startState });

  const logsIn = logs.filter(l => l.ts >= fromTs && l.ts <= toTs);
  for (const log of logsIn) {
    pts.push({ ts: log.ts, s: log.state_before });
    pts.push({ ts: log.ts + 500, s: log.state_after });
  }
  pts.push({ ts: toTs, s: stateLevel(m) });
  pts.sort((a, b) => a.ts - b.ts);

  if (pts.length < 2) return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px"><text x="50%" y="60%" text-anchor="middle" fill="#5a5a5a" font-size="10" font-family="JetBrains Mono,monospace">Keine Daten</text></svg>`;

  let linePath = `M ${toX(pts[0].ts).toFixed(1)} ${toY(pts[0].s).toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) {
    linePath += ` L ${toX(pts[i].ts).toFixed(1)} ${toY(pts[i].s).toFixed(1)}`;
  }
  const last = pts[pts.length - 1], first = pts[0];
  const areaPath = linePath + ` L ${toX(last.ts).toFixed(1)} ${H} L ${toX(first.ts).toFixed(1)} ${H} Z`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#d4ff00" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#d4ff00" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="0" y1="${toY(10).toFixed(1)}" x2="${W}" y2="${toY(10).toFixed(1)}" stroke="#f43f5e" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="${toY(8).toFixed(1)}" x2="${W}" y2="${toY(8).toFixed(1)}" stroke="#4ade80" stroke-width="0.5" stroke-dasharray="4,4"/>
    <path d="${areaPath}" fill="url(#sg)"/>
    <path d="${linePath}" fill="none" stroke="#d4ff00" stroke-width="1.5"/>
  </svg>`;
}

// ─── OVERVIEW-HEATBAR (Router-Karten-Ribbon) ───────────────────────────────
// Reduzierte Heatbar: dünnes Farb-Ribbon (14d) + Marker der letzten Session.
// Kein Live-Update — wird nur beim Re-Render der View neu gezeichnet.
function renderSparklineBg(card, m) {
  const bg = card.querySelector('[data-spark]');
  if (!bg) return;
  const now = nowMs();
  const days = heatWindowDays();
  const fromTs = now - days * 86400000;
  const span = now - fromTs;
  const boxes = heatBoxes(heatSegments(m, fromTs, now, days));

  const sessions = S.sessions.filter(s => s.mod_id === m.id && s.kind === 'session' && s.ts >= fromTs && s.ts <= now);
  const lastSession = sessions[sessions.length - 1];
  const marker = lastSession
    ? `<div class="heat-marker" style="left:${(((lastSession.ts - fromTs) / span) * 100).toFixed(2)}%"></div>`
    : '';

  bg.innerHTML = `<div class="heat-track">${boxes}${marker}</div>`;
}

// ─── MISC ──────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function updateClock() {
  const el = document.getElementById('clock');
  if (!el) return;
  const d = new Date();
  el.textContent =
    d.toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit'}) + ' ' +
    d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}

// ─── INIT ──────────────────────────────────────────────────────────────────
document.querySelectorAll('nav.tabs button').forEach(b =>
  b.onclick = () => switchView(b.dataset.view));
fab.onclick = openAddModal;
document.getElementById('pomo-pause').onclick = pomoPauseToggle;
document.getElementById('pomo-done').onclick = pomoFinish;
document.getElementById('pomo-cancel').onclick = closePomodoro;
render();

// Cloud: beim Start ziehen, und wenn der Tab wieder sichtbar wird (anderes Gerät könnte geändert haben).
cloudPull();
document.addEventListener('visibilitychange', () => {
  if (document.hidden) cloudFlush();   // in den Hintergrund → ungesicherte Änderungen sofort raus
  else cloudPull();                    // wieder sichtbar → frischen Stand holen
});
window.addEventListener('pagehide', cloudFlush); // Sicherung beim Schließen

// Live decay tick — every second on Router view
function tickModules() {
  if (view !== 'modules') return;
  document.querySelectorAll('[data-mod-live]').forEach(card => {
    const m = S.modules.find(x => x.id === card.dataset.modLive);
    if (!m) return;
    const { sl, spsVal, stripColor, driftText, driftClass } = modStateStripData(m);
    const strip = card.querySelector('.strip-tier');
    if (strip) { strip.className = 'strip-tier'; strip.style.background = stripColor; }
    const stateEl = card.querySelector('[data-ms-state]');
    if (stateEl) stateEl.textContent = sl.toFixed(3);
    const spsEl = card.querySelector('[data-ms-sps]');
    if (spsEl) spsEl.textContent = spsVal.toFixed(2);
    const driftEl = card.querySelector('[data-ms-drift]');
    if (driftEl) { driftEl.textContent = driftText; driftEl.className = `mod-state-drift ${driftClass}`; }
  });
}
setInterval(() => { if (view === 'router') tickLive(); else if (view === 'modules') tickModules(); else if (view === 'doing') tickDoing(); }, 1000);
setInterval(updateClock, 30000);
</script>
